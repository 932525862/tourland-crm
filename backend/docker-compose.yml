version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: crm
      POSTGRES_PASSWORD: crm
      POSTGRES_DB: agency_crm
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]

  redis:
    image: redis:7-alpine
    restart: always
    ports: ["6379:6379"]

  api:
    build: .
    restart: always
    env_file: .env
    depends_on: [postgres, redis]
    ports: ["4000:4000"]

volumes:
  pgdata:
